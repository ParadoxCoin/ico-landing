<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video API Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
        .result { background: #f4f4f4; padding: 15px; margin: 10px 0; border-radius: 4px; white-space: pre-wrap; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>🎬 Video API Test</h1>
    
    <div>
        <h2>1. Backend Durumu</h2>
        <button onclick="testHealth()">Health Check</button>
        <div id="health-result" class="result"></div>
    </div>

    <div>
        <h2>2. Video Modelleri</h2>
        <button onclick="testModels()">Modelleri Getir</button>
        <div id="models-result" class="result"></div>
    </div>

    <div>
        <h2>3. Video Efektleri</h2>
        <button onclick="testEffects()">Efektleri Getir</button>
        <div id="effects-result" class="result"></div>
    </div>

    <div>
        <h2>4. Video Üretimi</h2>
        <input type="text" id="prompt" placeholder="Video açıklaması (örn: a cat playing piano)" value="a cat playing piano">
        <select id="model">
            <option value="kling25_turbo_text_5s">Kling 2.5 Turbo (35 kredi)</option>
            <option value="veo3_fast_text_5s">Veo 3 Fast (30 kredi)</option>
            <option value="sora2_turbo_text_5s">Sora Turbo (30 kredi)</option>
        </select>
        <button onclick="testGenerate()">Video Üret</button>
        <div id="generate-result" class="result"></div>
    </div>

    <div>
        <h2>5. Efekt Uygulama</h2>
        <input type="text" id="effect-image" placeholder="Görsel URL" value="https://example.com/image.jpg">
        <select id="effect">
            <option value="earth_zoom">Earth Zoom In (15 kredi)</option>
            <option value="360_rotation">360° Rotation (12 kredi)</option>
            <option value="zoom_out">AI Zoom Out (10 kredi)</option>
        </select>
        <button onclick="testApplyEffect()">Efekt Uygula</button>
        <div id="effect-result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/v1';

        async function testHealth() {
            const result = document.getElementById('health-result');
            result.textContent = 'Test ediliyor...';
            result.className = 'result';
            
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
                result.className = 'result success';
            } catch (error) {
                result.textContent = `HATA: ${error.message}\n\nBackend çalışmıyor olabilir. Lütfen şunu çalıştırın:\ncd ai-saas-production/backend\npython simple_main.py`;
                result.className = 'result error';
            }
        }

        async function testModels() {
            const result = document.getElementById('models-result');
            result.textContent = 'Test ediliyor...';
            result.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/video/models`);
                const data = await response.json();
                result.textContent = `✅ ${data.data.length} model bulundu:\n\n` + JSON.stringify(data, null, 2);
                result.className = 'result success';
            } catch (error) {
                result.textContent = `HATA: ${error.message}`;
                result.className = 'result error';
            }
        }

        async function testEffects() {
            const result = document.getElementById('effects-result');
            result.textContent = 'Test ediliyor...';
            result.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/video/effects`);
                const data = await response.json();
                result.textContent = `✅ ${data.data.length} efekt bulundu:\n\n` + JSON.stringify(data, null, 2);
                result.className = 'result success';
            } catch (error) {
                result.textContent = `HATA: ${error.message}`;
                result.className = 'result error';
            }
        }

        async function testGenerate() {
            const result = document.getElementById('generate-result');
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model').value;
            
            result.textContent = 'Video üretiliyor...';
            result.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/video/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model_id: model })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.textContent = `✅ Video üretimi başladı!\n\n` + JSON.stringify(data, null, 2);
                    result.className = 'result success';
                } else {
                    result.textContent = `❌ Hata:\n\n` + JSON.stringify(data, null, 2);
                    result.className = 'result error';
                }
            } catch (error) {
                result.textContent = `HATA: ${error.message}`;
                result.className = 'result error';
            }
        }

        async function testApplyEffect() {
            const result = document.getElementById('effect-result');
            const imageUrl = document.getElementById('effect-image').value;
            const effectId = document.getElementById('effect').value;
            
            result.textContent = 'Efekt uygulanıyor...';
            result.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/video/effects/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ effect_id: effectId, image_url: imageUrl })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.textContent = `✅ Efekt uygulanıyor!\n\n` + JSON.stringify(data, null, 2);
                    result.className = 'result success';
                } else {
                    result.textContent = `❌ Hata:\n\n` + JSON.stringify(data, null, 2);
                    result.className = 'result error';
                }
            } catch (error) {
                result.textContent = `HATA: ${error.message}`;
                result.className = 'result error';
            }
        }

        // Sayfa yüklendiğinde otomatik health check
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>
